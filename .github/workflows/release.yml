name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build MCPB bundle
        run: make mcpb GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.mcpb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Biblium ${{ github.ref_name }}" \
            --generate-notes \
            dist/*.mcpb
